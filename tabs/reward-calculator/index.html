            const month = date.getMonth();
            if (month >= 0 && month <= 2) return 'q1';
            if (month >= 3 && month <= 5) return 'q2';
            if (month >= 6 && month <= 8) return 'q3';
            return 'q4';
        }

            return date.toLocaleString('default', { month: 'long' });

        // Function to get week labels for current month
        function getWeekLabels() {
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            const weeks = Math.ceil(daysInMonth / 7);
            return Array.from({length: weeks}, (_, i) => `W${i + 1}`);
        }

        // Update Weekly Rewards Chart
        function updateWeeklyChart(month) {
            const data = chartData.weekly[month];
            if (!data) return;
            
            const bars = document.querySelector('.weekly-chart .bar-chart .chart-bars');
            if (!bars) return;
            
            const barFills = bars.querySelectorAll('.bar-fill');
            const labels = document.querySelector('.weekly-chart .x-axis');
            const yAxis = document.querySelector('.weekly-chart .y-axis');
            if (!labels || !yAxis) return;
            
            const xAxisLabels = labels.querySelectorAll('span');
            const dataLabels = bars.querySelectorAll('.bar-data-label');
            const yAxisLabels = yAxis.querySelectorAll('span');
            
            // Find the maximum value in the data for proper normalization
            const maxValue = Math.max(...data.data);
            
            // Update Y-axis labels to match the data range
            updateYAxisLabels(yAxisLabels, maxValue);
            
            barFills.forEach((bar, index) => {
                // Normalize height based on the maximum value in current data
                const normalizedHeight = (data.data[index] / maxValue) * 100;
                bar.style.height = normalizedHeight + '%';
                
                // Update data label
                if (dataLabels[index]) {
                    dataLabels[index].textContent = data.data[index] + 'k';
                }
            });
            
            xAxisLabels.forEach((label, index) => {
                label.textContent = data.labels[index];
            });
            
            console.log(`Weekly chart updated for ${month}:`, data, `Max value: ${maxValue}`);
        }

        // Function to update Y-axis labels based on data range
        function updateYAxisLabels(yAxisLabels, maxValue) {
            if (!yAxisLabels || yAxisLabels.length === 0) return;
            
            // Calculate appropriate Y-axis scale
            const scale = Math.ceil(maxValue / 4); // Divide max value into 4 intervals
            const roundedScale = Math.ceil(scale / 5) * 5; // Round to nearest 5k
            
            // Update Y-axis labels in correct order (0 at bottom, max at top)
            yAxisLabels.forEach((label, index) => {
                if (index === 0) {
                    // Bottom label (highest value)
                    label.textContent = maxValue + 'k';
                } else if (index === yAxisLabels.length - 1) {
                    // Top label (0)
                    label.textContent = '0';
                } else {
                    // Middle labels (descending order)
                    const value = maxValue - (roundedScale * index);
                    label.textContent = value + 'k';
                }
            });
        }
