<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Header Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #0a0e17;
            color: #f8fafc;
            font-family: Arial, sans-serif;
        }
        
        /* Mobile Header Styles */
        .mobile-header {
            display: flex;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #0f172a;
            border-bottom: 1px solid #374151;
            z-index: 999;
            padding: 0 20px;
            align-items: center;
            justify-content: space-between;
        }
        
        .mobile-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .mobile-logo-icon {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            background: #10b981;
        }
        
        .mobile-logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #f8fafc;
        }
        
        .burger-menu-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 20px;
            font-weight: bold;
            min-width: 44px;
            min-height: 44px;
            /* Debug styles - make it very obvious */
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            border: 2px solid #ff0000;
        }
        
        .burger-menu-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
        }
        
        .burger-menu-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }
        
        /* Debug: Add a clickable area indicator */
        .burger-menu-btn::after {
            content: 'CLICK HERE';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff0000;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            white-space: nowrap;
            z-index: 1001;
        }
        
        /* Sidebar Container and Loading */
        #sidebar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #1f2937;
            border-right: 1px solid #374151;
            z-index: 1000;
            overflow-y: auto;
        }
        
        .sidebar-loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #f8fafc;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #374151;
            border-top: 4px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Sidebar Styles */
        .sidebar {
            width: 100%;
            height: 100%;
            background: #1f2937;
            border-right: 1px solid #374151;
            overflow-y: auto;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #374151;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
        }
        
        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: #f8fafc;
        }
        
        .sidebar-subtitle {
            font-size: 14px;
            color: #9ca3af;
        }
        
        .sidebar-nav {
            padding: 20px 0;
        }
        
        .nav-list {
            list-style: none;
        }
        
        .nav-item {
            margin-bottom: 4px;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            color: #f8fafc;
            text-decoration: none;
            transition: background-color 0.2s ease;
            position: relative;
        }
        
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .nav-icon-wrapper {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .nav-icon {
            width: 20px;
            height: 20px;
        }
        
        .nav-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        .nav-indicator {
            position: absolute;
            right: 20px;
            width: 4px;
            height: 20px;
            background: #10b981;
            border-radius: 2px;
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        
        .nav-link.active .nav-indicator {
            opacity: 1;
        }
        
        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #374151;
        }
        
        .connect-wallet-text {
            color: #10b981;
            font-weight: 600;
        }
        
        .sidebar-social {
            padding: 20px;
            border-top: 1px solid #374151;
        }
        
        .social-list {
            list-style: none;
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        
        .social-icon {
            width: 24px;
            height: 24px;
            opacity: 0.7;
            transition: opacity 0.2s ease;
        }
        
        .social-icon:hover {
            opacity: 1;
        }
        
        .mobile-close-btn {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #f8fafc;
            font-size: 24px;
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            z-index: 1001;
            transition: background-color 0.2s ease;
        }
        
        .mobile-close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex !important;
            }
            
            #sidebar-container {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            #sidebar-container.mobile-open {
                transform: translateX(0) !important;
            }
            
            .main-content {
                margin-left: 0 !important;
                margin-top: 60px !important;
                padding: 20px;
            }
            
            .mobile-close-btn {
                display: block !important;
            }
        }
        
        .main-content {
            margin-top: 60px;
            padding: 20px;
        }
        
        .test-button {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <!-- Mobile Header -->
    <header class="mobile-header">
        <div class="mobile-logo">
            <div class="mobile-logo-icon"></div>
            <span class="mobile-logo-text">IMG Protocol</span>
        </div>
        <button class="burger-menu-btn" id="burger-menu-btn" onclick="console.log('Inline onclick works!'); toggleSidebar();">
            ☰
        </button>
    </header>

    <div id="sidebar-container" data-page="dashboard">
        <div class="sidebar-loading">
            <div class="loading-spinner"></div>
            <p>Loading Navigation...</p>
        </div>
    </div>
    
    <main class="main-content">
        <h1>Mobile Header Test</h1>
        <p>This page tests the mobile header and burger menu functionality with the real sidebar.</p>
        
        <button class="test-button" onclick="testBurgerButton()">Test Burger Button</button>
        <button class="test-button" onclick="testSidebar()">Test Sidebar</button>
        
        <div id="debug-info" style="margin-top: 20px; padding: 20px; background: #1f2937; border-radius: 8px;">
            <h3>Debug Information</h3>
            <div id="debug-content"></div>
        </div>
    </main>

    <script>
        // Sidebar Loader Class
        class SidebarLoader {
            constructor() {
                this.sidebarContainer = document.getElementById('sidebar-container');
                this.burgerBtn = document.getElementById('burger-menu-btn');
                this.mobileCloseBtn = null;
                this.init();
            }
            
            async init() {
                console.log('SidebarLoader initializing...');
                await this.loadSidebar();
                this.setupMobileMenu();
                this.setupEventListeners();
            }
            
            async loadSidebar() {
                try {
                    console.log('Loading sidebar.html...');
                    const response = await fetch('/sidebar.html');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    const sidebarHtml = await response.text();
                    console.log('Sidebar HTML loaded, length:', sidebarHtml.length);
                    
                    this.sidebarContainer.innerHTML = sidebarHtml;
                    this.sidebarContainer.classList.add('loaded');
                    
                    // Get mobile close button after loading
                    this.mobileCloseBtn = document.getElementById('mobile-close-btn');
                    
                    console.log('Sidebar loaded successfully');
                } catch (error) {
                    console.error('Error loading sidebar:', error);
                    this.sidebarContainer.innerHTML = `
                        <div style="padding: 20px; color: #f8fafc;">
                            <h3>Sidebar Error</h3>
                            <p>Failed to load sidebar: ${error.message}</p>
                        </div>
                    `;
                }
            }
            
            setupMobileMenu() {
                if (!this.burgerBtn) {
                    console.error('Burger button not found!');
                    return;
                }
                
                console.log('Setting up mobile menu...');
                
                // Force mobile layout on small screens
                if (window.innerWidth <= 768) {
                    this.forceMobileLayout();
                }
                
                // Add resize listener
                window.addEventListener('resize', () => {
                    if (window.innerWidth <= 768) {
                        this.forceMobileLayout();
                    }
                });
            }
            
            forceMobileLayout() {
                console.log('Forcing mobile layout...');
                this.sidebarContainer.classList.remove('mobile-open');
                this.sidebarContainer.style.transform = 'translateX(-100%)';
            }
            
            setupEventListeners() {
                // Burger button click
                if (this.burgerBtn) {
                    this.burgerBtn.addEventListener('click', (e) => {
                        console.log('Burger button clicked!');
                        e.preventDefault();
                        e.stopPropagation();
                        this.toggleMobileMenu();
                    });
                }
                
                // Mobile close button click
                if (this.mobileCloseBtn) {
                    this.mobileCloseBtn.addEventListener('click', (e) => {
                        console.log('Mobile close button clicked!');
                        e.preventDefault();
                        e.stopPropagation();
                        this.closeMobileMenu();
                    });
                }
                
                // Close sidebar when clicking outside
                document.addEventListener('click', (e) => {
                    if (!this.sidebarContainer.contains(e.target) && 
                        !this.burgerBtn.contains(e.target) &&
                        this.sidebarContainer.classList.contains('mobile-open')) {
                        this.closeMobileMenu();
                    }
                });
            }
            
            toggleMobileMenu() {
                console.log('Toggling mobile menu...');
                if (this.sidebarContainer.classList.contains('mobile-open')) {
                    this.closeMobileMenu();
                } else {
                    this.openMobileMenu();
                }
            }
            
            openMobileMenu() {
                console.log('Opening mobile menu...');
                this.sidebarContainer.classList.add('mobile-open');
                this.sidebarContainer.style.transform = 'translateX(0)';
                console.log('Mobile menu opened, classes:', this.sidebarContainer.className);
            }
            
            closeMobileMenu() {
                console.log('Closing mobile menu...');
                this.sidebarContainer.classList.remove('mobile-open');
                this.sidebarContainer.style.transform = 'translateX(-100%)';
                console.log('Mobile menu closed, classes:', this.sidebarContainer.className);
            }
        }
        
        // Test functions
        function testBurgerButton() {
            const btn = document.getElementById('burger-menu-btn');
            const debug = document.getElementById('debug-content');
            
            debug.innerHTML = `
                <p><strong>Burger Button Test:</strong></p>
                <p>Button found: ${btn ? 'YES' : 'NO'}</p>
                <p>Button visible: ${btn ? btn.offsetParent !== null : 'N/A'}</p>
                <p>Button position: ${btn ? btn.getBoundingClientRect() : 'N/A'}</p>
                <p>Button styles: ${btn ? window.getComputedStyle(btn).display : 'N/A'}</p>
                <p>Button classes: ${btn ? btn.className : 'N/A'}</p>
                <p>Button onclick: ${btn ? (btn.onclick ? 'YES' : 'NO') : 'N/A'}</p>
            `;
        }
        
        function testSidebar() {
            const sidebar = document.getElementById('sidebar-container');
            const debug = document.getElementById('debug-content');
            
            debug.innerHTML += `
                <p><strong>Sidebar Test:</strong></p>
                <p>Sidebar found: ${sidebar ? 'YES' : 'NO'}</p>
                <p>Sidebar classes: ${sidebar ? sidebar.className : 'N/A'}</p>
                <p>Sidebar transform: ${sidebar ? sidebar.style.transform : 'N/A'}</p>
                <p>Sidebar mobile-open: ${sidebar ? sidebar.classList.contains('mobile-open') : 'N/A'}</p>
            `;
        }
        
        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, initializing SidebarLoader...');
            window.sidebarLoader = new SidebarLoader();
        });
    </script>
</body>
</html>
