<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMG Protocol - Dashboard</title>
    <meta name="description" content="Main dashboard for IMG Protocol financial platform" />
    
    <!-- Enhanced Page-Level Wallet Status Manager -->
    <script>
        // ENHANCED PAGE-LEVEL WALLET STATUS: Robust wallet state management
        (function() {
            try {
                // Check multiple sources for wallet state
                const walletConnected = localStorage.getItem('walletConnected') === 'true';
                const storedWalletState = localStorage.getItem('imgProtocolWalletState');
                const walletPublicKey = localStorage.getItem('walletPublicKey');
                const walletPremium = localStorage.getItem('walletPremium') === 'true';
                
                let isConnected = false;
                let publicKey = null;
                let isPremium = false;
                
                // Primary check: direct wallet connected flag
                if (walletConnected) {
                    isConnected = true;
                    publicKey = walletPublicKey || 'connected';
                    isPremium = walletPremium;
                    console.log('🚀 PAGE WALLET: Direct connection detected');
                }
                // Secondary check: stored wallet state
                else if (storedWalletState) {
                    try {
                        const parsed = JSON.parse(storedWalletState);
                        if (parsed.isConnected && parsed.walletPublicKey) {
                            isConnected = true;
                            publicKey = parsed.walletPublicKey;
                            isPremium = parsed.isPremium || false;
                            console.log('🔄 PAGE WALLET: Stored state restored');
                        }
                    } catch (error) {
                        console.error('❌ PAGE WALLET: Error parsing stored state:', error);
                    }
                }
                
                // Set page-level wallet status
                window.pageWalletStatus = {
                    isConnected,
                    publicKey,
                    isPremium,
                    timestamp: Date.now(),
                    source: isConnected ? (walletConnected ? 'direct' : 'stored') : 'none'
                };
                
                if (isConnected) {
                    console.log('🚀 PAGE WALLET: Status set before page load:', window.pageWalletStatus);
                } else {
                    console.log('🔒 PAGE WALLET: No wallet connected');
                }
                
                // Also set a global flag for immediate access
                window.walletStateReady = true;
                
            } catch (error) {
                console.error('❌ PAGE WALLET: Error setting wallet status:', error);
                // Set safe defaults
                window.pageWalletStatus = {
                    isConnected: false,
                    publicKey: null,
                    isPremium: false,
                    timestamp: Date.now(),
                    source: 'error'
                };
                window.walletStateReady = true;
            }
        })();
    </script>
    
    <link rel="stylesheet" href="./style.css?v=283">
</head>
<body>
    <!-- Sidebar Container -->
    <div id="sidebar-container"></div>
    
    <!-- Main Content Container -->
    <div id="main-content"></div>
    
    <!-- Wallet Modal -->
    <div id="wallet-modal" class="wallet-modal">
        <div class="wallet-modal-content">
            <div class="wallet-modal-header">
                <h2>Connect Wallet</h2>
                <button id="wallet-modal-close" class="wallet-modal-close">&times;</button>
            </div>
            <div class="wallet-modal-body">
                <div class="wallet-providers">
                    <button class="wallet-provider-btn" data-provider="phantom">
                        <img src="./public/phantom-icon.png" alt="Phantom" class="wallet-icon">
                        <span>Phantom</span>
                    </button>
                    <button class="wallet-provider-btn" data-provider="solflare">
                        <img src="./public/solflare-icon.png" alt="Solflare" class="wallet-icon">
                        <span>Solflare</span>
                    </button>
                </div>
                <div id="wallet-status" class="wallet-status" style="display: none;">
                    <div class="status-text"></div>
                </div>
                <div id="wallet-result" class="wallet-result" style="display: none;">
                    <div class="result-icon"></div>
                    <div class="result-text"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- SPA App Script -->
    <script type="module" src="./src/app.js"></script>
</body>
</html>
