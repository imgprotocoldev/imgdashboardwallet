services:
  - type: web
    name: img-protocol-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: IMG_TOKEN_MINT
        value: znv3FZt2HFAvzYf5LxzVyryh3mBXWuTRRng25gEZAjh
      - key: REQUIRED_IMG_AMOUNT
        value: 47500
      - key: CORS_ORIGIN
        value: https://imgprotocol.io
